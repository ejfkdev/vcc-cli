name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: vcc-aarch64-macos
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: vcc-x86_64-macos
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: vcc-aarch64-linux-gnu
          # ARM64 musl temporarily disabled — cross-compiler download unreliable
          # - os: ubuntu-22.04
          #   target: aarch64-unknown-linux-musl
          #   artifact: vcc-aarch64-linux-musl
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: vcc-x86_64-linux-gnu
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact: vcc-x86_64-linux-musl
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: vcc-x86_64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$RUNNER_OS" = "macOS" ]; then
            sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          fi
          echo "Building version: ${VERSION}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64 GNU)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install UPX (Linux/Windows)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          UPX_VERSION="4.2.4"
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -sL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-win64.zip" -o upx.zip
            unzip -o upx.zip
            cp "upx-${UPX_VERSION}-win64/upx.exe" "$HOME/.cargo/bin/"
          else
            curl -sL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" -o upx.tar.xz
            tar xf upx.tar.xz
            sudo cp "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/
          fi

      - name: Compress with UPX (Linux/Windows)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            upx --best "target/${{ matrix.target }}/release/vcc.exe"
          else
            upx --best "target/${{ matrix.target }}/release/vcc"
          fi

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p output
          cp "target/${{ matrix.target }}/release/vcc" "output/${{ matrix.artifact }}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p output
          cp "target/${{ matrix.target }}/release/vcc.exe" "output/${{ matrix.artifact }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: output/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          gh release create "$TAG" artifacts/* \
            --title "v${VERSION}" \
            --notes "See [CHANGELOG.md](https://github.com/ejfkdev/vcc-cli/blob/main/CHANGELOG.md) for details."

  homebrew:
    name: Publish Homebrew Formula
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ejfkdev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate formula
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/ejfkdev/vcc-cli/releases/download/v${VERSION}"

          # Download binaries and compute SHA256
          curl -fsSL "${BASE_URL}/vcc-aarch64-macos" -o vcc-aarch64-macos
          curl -fsSL "${BASE_URL}/vcc-x86_64-macos" -o vcc-x86_64-macos
          curl -fsSL "${BASE_URL}/vcc-x86_64-linux-musl" -o vcc-x86_64-linux-musl
          curl -fsSL "${BASE_URL}/vcc-aarch64-linux-gnu" -o vcc-aarch64-linux-gnu

          ARM64_MAC_SHA=$(shasum -a 256 vcc-aarch64-macos | cut -d' ' -f1)
          X64_MAC_SHA=$(shasum -a 256 vcc-x86_64-macos | cut -d' ' -f1)
          X64_LINUX_SHA=$(shasum -a 256 vcc-x86_64-linux-musl | cut -d' ' -f1)
          ARM64_LINUX_SHA=$(shasum -a 256 vcc-aarch64-linux-gnu | cut -d' ' -f1)

          cat > vcc.rb <<FORMULA
          class Vcc < Formula
            desc "Unified configuration manager for AI coding tools"
            homepage "https://github.com/ejfkdev/vcc-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/vcc-aarch64-macos"
                sha256 "${ARM64_MAC_SHA}"
              else
                url "${BASE_URL}/vcc-x86_64-macos"
                sha256 "${X64_MAC_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/vcc-aarch64-linux-gnu"
                sha256 "${ARM64_LINUX_SHA}"
              else
                url "${BASE_URL}/vcc-x86_64-linux-musl"
                sha256 "${X64_LINUX_SHA}"
              end
            end

            def install
              on_macos do
                if Hardware::CPU.arm?
                  bin.install "vcc-aarch64-macos" => "vcc"
                else
                  bin.install "vcc-x86_64-macos" => "vcc"
                end
              end
              on_linux do
                if Hardware::CPU.arm?
                  bin.install "vcc-aarch64-linux-gnu" => "vcc"
                else
                  bin.install "vcc-x86_64-linux-musl" => "vcc"
                end
              end
            end
          end
          FORMULA

      - name: Push formula
        run: |
          git config user.name "ejfkdev bot"
          git config user.email "bot@ejfk.dev"
          git add vcc.rb
          git diff --cached --quiet || git commit -m "vcc ${GITHUB_REF_NAME#v}"
          git push
