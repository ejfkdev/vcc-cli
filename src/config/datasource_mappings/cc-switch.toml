[source]

[source.path.linux]
base = "~/.cc-switch"
db = "cc-switch.db"

[source.path.macos]
base = "~/.cc-switch"
db = "cc-switch.db"

[source.path.windows]
base = "~/.cc-switch"
db = "cc-switch.db"

[skills]
scan_dirs = [
    { path = "~/.cc-switch/skills", tag = "cc-switch" },
    { path = "~/.agents/skills", tag = "agents" },
    { path = "~/.claude/skills", tag = "claude" },
    { path = "~/.codex/skills", tag = "codex" },
]

# ══════════════════════════════════════════════════════════
# Provider 类型映射：cc-switch (category, app_type) → VCC type
# 格式: "category:app_type" = "vcc_type"
# ══════════════════════════════════════════════════════════

[provider_type_map]
"official:claude" = "anthropic"
"official:codex" = "openai"
"official:gemini" = "google"
"cn_official:claude" = "anthropic"
"cn_official:codex" = "openai"
"cn_official:gemini" = "google"

# ══════════════════════════════════════════════════════════
# MCP Server 类型映射：cc-switch type → VCC type
# ══════════════════════════════════════════════════════════

[mcp_type_map]
"stdio" = "stdio"
"http" = "sse"
"sse" = "sse"
"streamable-http" = "streamable-http"

# ══════════════════════════════════════════════════════════
# Per-tool 启用列映射：数据库列名 → 工具名
# 用于 mcp_servers 和 skills 表的 enabled_<tool> 列
# ══════════════════════════════════════════════════════════

[enabled_columns]
"enabled_claude" = "claude"
"enabled_codex" = "codex"
"enabled_gemini" = "gemini"
"enabled_opencode" = "opencode"

# ══════════════════════════════════════════════════════════
# common_config 键映射：settings 表中的 key → 工具名
# ══════════════════════════════════════════════════════════

[common_config_keys]
"common_config_claude" = "claude"
"common_config_codex" = "codex"
"common_config_opencode" = "opencode"
"common_config_gemini" = "gemini"

# ══════════════════════════════════════════════════════════
# Provider env 已知变量列表（提取 extra_env 时排除）
# ══════════════════════════════════════════════════════════

[env_known_keys.claude]
all = [
    "ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "ANTHROPIC_MODEL",
    "ANTHROPIC_DEFAULT_HAIKU_MODEL", "ANTHROPIC_DEFAULT_OPUS_MODEL",
    "ANTHROPIC_DEFAULT_SONNET_MODEL", "ANTHROPIC_REASONING_MODEL",
    "API_TIMEOUT_MS", "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC",
]
model_env = [
    "ANTHROPIC_DEFAULT_SONNET_MODEL", "ANTHROPIC_DEFAULT_OPUS_MODEL",
    "ANTHROPIC_DEFAULT_HAIKU_MODEL", "ANTHROPIC_REASONING_MODEL",
]

[env_known_keys.codex]
all = ["OPENAI_API_KEY", "OPENAI_BASE_URL"]

[env_known_keys.gemini]
all = ["GEMINI_API_KEY", "GOOGLE_API_KEY", "GEMINI_BASE_URL"]

# ══════════════════════════════════════════════════════════
# MCP Server 已知字段列表（提取 extra 字段时排除）
# ══════════════════════════════════════════════════════════

[mcp_known_keys]
all = ["type", "command", "args", "env", "url", "headers"]
