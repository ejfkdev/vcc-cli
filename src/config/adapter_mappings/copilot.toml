[tool]
name = "copilot"
config_dir = "~/.copilot"

[session]
format = "jsonl"
path = "otel"
resume_command = "copilot --resume {id}"

[session.jsonl]
filter = { type = "span", "attributes.gen_ai.operation.name" = "chat" }
model_path = "attributes.gen_ai.response.model"
default_model = "copilot"
timestamp_path = "startTime"
normalize_cache_read = true
dedup_key_paths = "traceId:spanId"

[session.jsonl.token_map]
input = "attributes.gen_ai.usage.input_tokens"
output = "attributes.gen_ai.usage.output_tokens"
cache_read = "attributes.gen_ai.usage.cache_read_input_tokens"
cache_creation = "attributes.gen_ai.usage.cache_creation_input_tokens"
